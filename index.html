<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ホームページに移動中</title>
        <meta
            http-equiv="refresh"
            content="0;URL='https://script.google.com/a/macros/gmath.meijo-u.ac.jp/s/AKfycbypFP7SlzrMouax46AsNVHEvjndJHffDKB8WaItMxfOSeYGV70rFQg4akFzQ9X4yT-fKw/exec'"
        />
        <style>
            body {
                margin: 0;
                padding: 0;
                background-color: #f8f9fa;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                height: 100vh;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    "Helvetica Neue", Arial, sans-serif;
            }
            .container {
                text-align: center;
            }
            .spinner {
                border: 4px solid rgba(0, 0, 0, 0.1);
                width: 48px;
                height: 48px;
                border-radius: 50%;
                border-left-color: #09f;
                animation: spin 1s linear infinite;
                margin: 0 auto 20px auto;
            }
            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }
            p {
                font-size: 1.1rem;
                color: #495057;
                margin: 0;
            }
            .fallback-link {
                margin-top: 15px;
                font-size: 0.9rem;
                color: #007bff;
                text-decoration: none;
            }
            .fallback-link:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="spinner"></div>
            <p>ホームページに移動中...</p>
            <!-- <p style="margin-top: 10px">
                <a
                    class="fallback-link"

                    >画面が切り替わらない場合はこちらをクリックしてください</a
                >
            </p> -->
        </div>
    </body>
</html>
